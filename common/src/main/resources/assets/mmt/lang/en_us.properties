mmt.command.clear.unknown_sub=Unknown subcommand: %s
mmt.command.clear.failed=Clear failed: %s

# Status command
mmt.command.status.header=Status summary (target language: %s)
mmt.command.status.extracted=Extracted keys: %d
mmt.command.status.translated=Translated keys: %d
mmt.command.status.packed=Packed keys: %d
mmt.command.status.user_translated=User translated keys: %d
mmt.command.status.last_pack=Last pack time: %s

# Confirm command
mmt.command.confirm.nothing=Nothing to confirm
