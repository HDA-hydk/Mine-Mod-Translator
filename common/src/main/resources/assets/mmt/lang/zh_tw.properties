# MMT - 繁體中文
# 命令返回訊息

# 通用
mmt.prefix=[MMT]

# 提取命令
mmt.command.extract.success=提取完成
mmt.command.extract.failed=提取失敗，請查看日誌
mmt.command.extract.stats=本次處理：%d個模組、%d個鍵；總計：%d個模組、%d個鍵；字典命中：%d

# 翻譯命令
mmt.command.translate.success=翻譯完成
mmt.command.translate.failed=翻譯失敗，請查看日誌
mmt.command.translate.stats=模組數：%d，總鍵數：%d，已翻譯：%d，翻譯失敗：%d，翻譯方式[%s]

# 打包命令
mmt.command.pack.success=打包完成
mmt.command.pack.failed=打包失敗，請查看日誌
mmt.command.pack.stats=模組數：%d，總鍵數：%d，手動更改鍵：%d，因優先級低被覆蓋鍵：%d

# 配置命令
mmt.command.config.usage=用法：/mmt config <get|set|reload> [key] [value]
mmt.command.config.get=設定 %s = %s
mmt.command.config.set=設定 %s 已更新為 %s
mmt.command.config.reload=設定已重新載入
mmt.command.config.specify_key=請指定設定鍵
mmt.command.config.specify_key_value=請指定設定鍵和值
mmt.command.config.not_set=(未設定)
mmt.command.config.unknown_sub=未知子命令：%s

# 詞典命令
mmt.command.dict.status=詞典狀態：已載入檔案=%d個，條目數=%d，目錄檔案=%d個，總大小=%s
mmt.command.dict.not_loaded=詞典未載入（目錄檔案：%d個，總大小：%s）
mmt.command.dict.unknown_sub=未知子命令：%s
mmt.command.dict.install.usage=用法：/mmt dict install <mini|full>
mmt.command.dict.install.unknown_version=未知版本：%s（可用：mini, full）
mmt.command.dict.install.already_downloading=已有詞典正在下載中，請稍候
mmt.command.dict.install.started=開始下載詞典：%s，下載完成後自動載入
mmt.command.dict.reload.success=詞典已重新載入：%d個檔案，%d條條目
mmt.command.dict.reload.failed=詞典重新載入失敗，請查看日誌
mmt.command.dict.dir=詞典目錄：%s（可手動將json檔案放入此目錄）

# 清空命令
mmt.command.clear.usage=用法：/mmt clear <extracted|translated|packed|ai|all> [targetLanguage]
mmt.command.clear.confirm=此操作將清空語言 %s 的 %s 資料。輸入 /mmt confirm 確認。
mmt.command.clear.success=已清空語言 %s 的 %s 資料
mmt.command.clear.cleared_extracted=extracted.json 已清除
mmt.command.clear.cleared_translated=translated.json 已清除
mmt.command.clear.cleared_packed=packed.json 已清除
mmt.command.clear.cleared_ai=AI翻譯檔案已清除
mmt.command.clear.cleared_all=所有資料已清除
mmt.command.clear.unknown_sub=未知子命令：%s
mmt.command.clear.failed=清除失敗：%s

# 狀態命令
mmt.command.status.header=狀態摘要（目標語言：%s）
mmt.command.status.extracted=已提取鍵：%d
mmt.command.status.translated=已翻譯鍵：%d
mmt.command.status.packed=已打包鍵：%d
mmt.command.status.user_translated=使用者手動翻譯鍵：%d
mmt.command.status.last_pack=最近打包時間：%s

# 確認命令
mmt.command.confirm.nothing=沒有待確認的操作
mmt.command.confirm.expired=確認已過期，請重新操作

# 自動流水線命令
mmt.command.auto.started=流水線已啟動（目標語言：%s），請查看日誌了解進度
mmt.command.auto.already_running=流水線正在執行中

# 流水線進度訊息
mmt.pipeline.summary=流水線進度（%s）：已提取鍵 %d 個，待翻譯鍵 %d 個，待打包鍵 %d 個
mmt.pipeline.extract_failed=提取步驟失敗，請查看日誌
mmt.pipeline.translate_failed=翻譯步驟失敗，請查看日誌
mmt.pipeline.pack_failed=打包步驟失敗，請查看日誌
mmt.pipeline.next_step.translate.head=請將
mmt.pipeline.next_step.translate.tail=中的 AI 翻譯檔案傳送給 AI 翻譯，將 AI 輸出儲存為同目錄下 %s，然後重新執行 /mmt auto
mmt.pipeline.next_step.pack=翻譯已完成，請重新執行 /mmt auto 以打包資源包
mmt.pipeline.next_step.done.head=資源包 %s 已生成於
mmt.pipeline.next_step.done.tail=（請在遊戲中啟用）
mmt.pipeline.disable_hint=提示：執行 "/mmt togglejoinmsg off" 可關閉進入世界時的此提示

# 開關進入世界提示命令
mmt.command.togglejoinmsg.usage=用法：/mmt togglejoinmsg [on|off]
mmt.command.togglejoinmsg.enabled=進入世界提示已開啟
mmt.command.togglejoinmsg.disabled=進入世界提示已關閉
mmt.command.togglejoinmsg.save_failed=儲存設定失敗：%s

